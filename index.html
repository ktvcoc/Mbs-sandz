<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marina Bay Sandz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="logo">MARINA BAY SANDZ</div>
    
    <div class="nav">
      <a href="#">Trang chủ</a>
      <a href="#">Live Video</a>
      <a href="#">CSKH</a>
    </div>

    <div class="auth-buttons">
      <button class="btn-register" onclick="showRegister()">Đăng Ký</button>
      <button class="btn-login" onclick="showLogin()">Đăng Nhập</button>
    </div>
  </div>

  <!-- BANNER -->
  <div class="banner">
    <img src="https://i.imgur.com/5zKzZ3L.jpg" alt="Banner">
    <div class="freechip">5000 FREECHIP</div>
  </div>

  <!-- 4 CARDS -->
  <div class="cards">
    <div class="card">
      <img src="https://i.imgur.com/8zq3X9k.jpg" alt="AG">
      <div class="label">AG Asia Gaming</div>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/3vL2p8m.jpg" alt="SB">
      <div class="label">申博</div>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/7kL9p2q.jpg" alt="Hoàng Cung">
      <div class="label">Hoàng Cung</div>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/9mN2x8v.jpg" alt="Poker">
      <div class="label">Open Yuan Poker</div>
    </div>
  </div>

  <script>
    function showRegister() {
      alert("Chức năng Đăng Ký đang được phát triển");
    }
    function showLogin() {
      alert("Chức năng Đăng Nhập đang được phát triển");
    }
  </script>
</body>
</html>
